name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel duplicate runs on the same PR / branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    # Vitest unit tests for the pure helpers in src/lib.ts.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        # Pin pnpm so CI doesn't drift to a major that requires a newer
        # Node. Once toolchain modernization (#30) lands, package.json
        # will gain a "packageManager" field and we can switch to corepack.
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

  sanity:
    # Sanity build: confirms the bundle still emits and the single-chunk
    # invariant holds at the file level. Cheaper than the perf gate.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

  performance:
    # Headless perf gate. Drives perf-test/host.html via Playwright and
    # asserts the load-time invariants. Build is a prerequisite for the
    # gate (perf runs against dist/), so it lives in this job too.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        # Needed by scripts/perf.mjs.
        run: pnpm exec playwright install chromium

      - name: Build plugin
        run: pnpm build

      - name: Perf gate
        # Runs scripts/perf.mjs against the just-built dist. Asserts:
        #   - resourceCount === 1 (the 0.0.8 single-chunk invariant)
        #   - median load < 800ms
        run: pnpm perf

  e2e:
    # Slow gate: drives real Logseq.app via Playwright (~5 min). macOS
    # runner because the existing e2e/run.sh patches Logseq's electron.js
    # to honor LOGSEQ_FAKE_HOME — a workaround for macOS's
    # HOME-vs-getpwuid divergence. Linux Electron honors HOME so the
    # patch isn't needed, but porting would also need AppImage extraction
    # and xvfb. Public repos get free macOS minutes.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      # Logseq.app cache. The DMG is ~150MB; downloading every run is wasteful.
      # Pin LOGSEQ_VERSION so cache misses only happen on intentional bumps.
      - name: Cache Logseq.app
        id: cache-logseq
        uses: actions/cache@v4
        with:
          path: /Applications/Logseq.app
          key: logseq-app-${{ env.LOGSEQ_VERSION }}-${{ runner.os }}-${{ runner.arch }}
        env:
          LOGSEQ_VERSION: 0.10.15

      - name: Download and install Logseq
        if: steps.cache-logseq.outputs.cache-hit != 'true'
        env:
          LOGSEQ_VERSION: 0.10.15
        run: |
          set -euo pipefail
          # GitHub macos-latest runners are arm64 as of 2026.
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            DMG_NAME="Logseq-darwin-arm64-${LOGSEQ_VERSION}.dmg"
          else
            DMG_NAME="Logseq-darwin-x64-${LOGSEQ_VERSION}.dmg"
          fi
          URL="https://github.com/logseq/logseq/releases/download/${LOGSEQ_VERSION}/${DMG_NAME}"
          echo "Downloading $URL"
          curl -fL -o /tmp/Logseq.dmg "$URL"
          # Mount, copy, eject
          MOUNT_POINT=$(hdiutil attach -nobrowse -noverify -noautoopen /tmp/Logseq.dmg | tail -1 | awk '{print $3}')
          echo "Mounted at $MOUNT_POINT"
          cp -R "$MOUNT_POINT/Logseq.app" /Applications/
          hdiutil detach "$MOUNT_POINT"
          rm /tmp/Logseq.dmg
          # Quarantine flag would prompt Gatekeeper on first launch; strip it
          xattr -dr com.apple.quarantine /Applications/Logseq.app || true
          ls /Applications/Logseq.app/Contents/MacOS/Logseq

      - name: Install Playwright Chromium
        # The E2E suite uses Playwright's Electron driver against
        # Logseq.app and doesn't need Chromium directly, but install
        # for parity with the verify job.
        run: pnpm exec playwright install chromium

      - name: Run E2E suite
        run: pnpm test:e2e
        env:
          # Disable color codes that break GitHub Actions log parsing
          NO_COLOR: "1"

      - name: Upload Logseq logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logseq-e2e-logs
          path: |
            /tmp/logseq-e2e-*
          if-no-files-found: ignore
          retention-days: 7
